services:
  db:
    image: postgres:15
    container_name: playto-pay-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: playto
      POSTGRES_USER: playto
      POSTGRES_PASSWORD: playto
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: playto-pay-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres_data:
